<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canteen Admin | Core Control Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen pb-12">

    <nav class="bg-slate-950 border-b border-slate-800 px-4 py-4 sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-lg font-bold tracking-tight text-amber-400">STAFF<span>.PANEL</span></h1>
            <span class="bg-red-500/10 border border-red-500/20 text-red-400 px-2.5 py-0.5 rounded-md text-xs font-mono font-bold animate-pulse">
                🔴 COUNTER CONSOLE
            </span>
        </div>
    </nav>

    <main class="max-w-md mx-auto px-4 mt-6 space-y-6">
        
        <section class="bg-slate-950 border border-slate-800 rounded-2xl p-5 space-y-4">
            <div>
                <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Scan Token Entry</h2>
                <p class="text-xs text-slate-500">Simulates physical QR code hardware inputs</p>
            </div>
            
            <div class="flex gap-2">
                <input type="number" id="scan-input" placeholder="Enter Order ID (e.g. 3)" 
                    class="bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-slate-100 focus:outline-none focus:border-amber-500 w-full font-mono font-bold text-lg">
                <button onclick="fetchOrderDetails()" 
                    class="bg-amber-400 hover:bg-amber-500 active:scale-[0.97] transition-all text-slate-950 font-bold px-6 rounded-xl text-sm whitespace-nowrap">
                    Fetch Order
                </button>
            </div>
        </section>

        <section id="order-display" class="hidden space-y-4"></section>

        <section class="bg-slate-950 border border-slate-800 rounded-2xl p-5 space-y-4">
            <div>
                <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Add New Menu Item</h2>
                <p class="text-xs text-slate-500">Register new dishes directly into production storage</p>
            </div>
            <div class="space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="new-item-name" placeholder="Item Name (e.g., Porotta)" class="bg-slate-900 border border-slate-700 rounded-xl p-2.5 text-xs text-slate-100 focus:outline-none focus:border-amber-500">
                    <input type="number" id="new-item-price" placeholder="Price (₹)" class="bg-slate-900 border border-slate-700 rounded-xl p-2.5 text-xs text-slate-100 focus:outline-none focus:border-amber-500">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <select id="new-item-category" class="bg-slate-900 border border-slate-700 rounded-xl p-2.5 text-xs text-slate-400 focus:outline-none focus:border-amber-500">
                        <option value="Lunch">Lunch Pipeline</option>
                        <option value="Snacks">Snacks Pipeline</option>
                        <option value="Drinks">Drinks Pipeline</option>
                    </select>
                    <input type="number" id="new-item-stock" placeholder="Initial Stock Count" class="bg-slate-900 border border-slate-700 rounded-xl p-2.5 text-xs text-slate-100 focus:outline-none focus:border-amber-500">
                </div>
                <input type="text" id="new-item-desc" placeholder="Brief Item Description Field" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-2.5 text-xs text-slate-100 focus:outline-none focus:border-amber-500">
                <button onclick="commitNewItemToServer()" class="w-full bg-emerald-500 hover:bg-emerald-600 font-bold py-2.5 rounded-xl text-xs text-slate-950 active:scale-[0.98] transition-all">
                    ➕ Deploy Item Onto Live System
                </button>
            </div>
        </section>
        
        <section class="bg-slate-950 border border-slate-800 rounded-2xl p-5 space-y-4">
            <div>
                <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Live Inventory Stock & Price Engine</h2>
                <p class="text-xs text-slate-500">Modify structural database allocations on the fly</p>
            </div>

            <div class="space-y-6">
                <div>
                    <h3 class="text-xs font-bold text-amber-500/80 tracking-widest uppercase mb-2 border-b border-slate-800/60 pb-1">🍱 Lunch</h3>
                    <div id="grid-Lunch" class="space-y-3"></div>
                </div>
                <div>
                    <h3 class="text-xs font-bold text-amber-500/80 tracking-widest uppercase mb-2 border-b border-slate-800/60 pb-1">🍿 Snacks</h3>
                    <div id="grid-Snacks" class="space-y-3"></div>
                </div>
                <div>
                    <h3 class="text-xs font-bold text-amber-500/80 tracking-widest uppercase mb-2 border-b border-slate-800/60 pb-1">🥤 Drinks</h3>
                    <div id="grid-Drinks" class="space-y-3"></div>
                </div>
            </div>
        </section>

    </main>

    <script>
        const API_BASE = "http://192.168.1.36:8000/api";
        let currentActiveOrderId = null;
        let menuData = {}; // Managed completely dynamically by backend pulls

        // 1. Initialize and Sync Database Layouts
        document.addEventListener("DOMContentLoaded", async () => {
            await fetchLiveAdminMenu();
        });

        async function fetchLiveAdminMenu() {
            try {
                const response = await fetch(`${API_BASE}/menu`);
                if (!response.ok) throw new Error();
                const liveItems = await response.json();
                
                menuData = {};
                liveItems.forEach(item => {
                    menuData[item.item_id] = {
                        name: item.name,
                        price: item.price,
                        stock: item.stock || 50, // Fallback if backend key varies
                        category: item.category,
                        is_visible: item.is_visible
                    };
                });
                
                renderMasterInventoryPanel();
            } catch (err) {
                console.error(err);
                alert("Failed to synchronize tracking system with PostgreSQL server state.");
            }
        }

        function renderMasterInventoryPanel() {
            document.getElementById("grid-Lunch").innerHTML = "";
            document.getElementById("grid-Snacks").innerHTML = "";
            document.getElementById("grid-Drinks").innerHTML = "";

            Object.keys(menuData).forEach(id => {
                const item = menuData[id];
                const targetGrid = document.getElementById(`grid-${item.category}`);
                
                if (!targetGrid) return;

                const card = document.createElement("div");
                card.className = `bg-slate-900 p-3.5 rounded-xl border transition-all ${item.is_visible ? 'border-slate-800' : 'border-slate-950 opacity-45 bg-slate-950/30'}`;
                
                card.innerHTML = `
                    <div class="flex flex-col gap-3">
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="text-sm font-bold text-slate-100">${item.name}</p>
                                <p class="text-[10px] text-slate-500 font-mono">Item DB ID: #${id}</p>
                            </div>
                            <button onclick="toggleVisibilityState(${id})" 
                                class="text-[11px] px-2.5 py-1 rounded-md font-semibold transition-all ${item.is_visible ? 'bg-slate-800 text-slate-400 hover:text-red-400' : 'bg-amber-500 text-slate-950 font-bold'}">
                                ${item.is_visible ? '👁️ Hide' : '✨ Show'}
                            </button>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-2 pt-1 border-t border-slate-800/40">
                            <div class="flex gap-1.5 items-center">
                                <input type="number" id="stock-input-${id}" placeholder="Stock" value="${item.stock || 50}"
                                    class="bg-slate-950 border border-slate-700 rounded-lg px-2 py-1 text-center font-mono text-xs font-bold w-14 text-slate-100 focus:outline-none focus:border-amber-500">
                                <button onclick="commitStockUpdate(${id})" class="bg-slate-800 hover:bg-slate-700 text-[10px] text-slate-300 font-bold px-2 py-1 rounded-md border border-slate-700 flex-1">Stock</button>
                            </div>
                            <div class="flex gap-1.5 items-center">
                                <input type="number" id="price-input-${id}" placeholder="Price" value="${item.price}"
                                    class="bg-slate-950 border border-slate-700 rounded-lg px-1.5 py-1 text-center font-mono text-xs font-bold w-16 text-emerald-400 focus:outline-none focus:border-amber-500">
                                <button onclick="commitPriceUpdate(${id})" class="bg-slate-800 hover:bg-slate-700 text-[10px] text-emerald-400 font-bold px-2 py-1 rounded-md border border-slate-700 flex-1">₹ Price</button>
                            </div>
                        </div>
                    </div>
                `;
                targetGrid.appendChild(card);
            });
        }

        // 2. Commit Live Price Updates
        async function commitPriceUpdate(itemId) {
            const priceField = document.getElementById(`price-input-${itemId}`);
            const updatedPrice = parseFloat(priceField.value);

            if (isNaN(updatedPrice) || updatedPrice < 0) return alert("Enter a valid price parameter.");

            try {
                const response = await fetch(`${API_BASE}/admin/price`, {
                    method: "PATCH",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ item_id: itemId, new_price: updatedPrice })
                });

                if (!response.ok) throw new Error();
                
                menuData[itemId].price = updatedPrice;
                triggerControlSuccessFeedback(priceField);
            } catch (err) {
                alert("Could not commit new price mapping to backend.");
            }
        }

        // 3. Toggle Visibility Flag
        async function toggleVisibilityState(itemId) {
            const currentVisibilityState = menuData[itemId].is_visible;
            const targetState = !currentVisibilityState;

            try {
                const response = await fetch(`${API_BASE}/admin/visibility`, {
                    method: "PATCH",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ item_id: itemId, is_visible: targetState })
                });

                if (!response.ok) throw new Error();
                
                menuData[itemId].is_visible = targetState;
                renderMasterInventoryPanel(); 
            } catch (err) {
                alert("Database transmission failure updating item visibility states.");
            }
        }

        // 4. Create and Deploy Brand New Menu Entity
        async function commitNewItemToServer() {
            const name = document.getElementById("new-item-name").value;
            const price = parseFloat(document.getElementById("new-item-price").value);
            const category = document.getElementById("new-item-category").value;
            const stock = parseInt(document.getElementById("new-item-stock").value);
            const desc = document.getElementById("new-item-desc").value || "Fresh kitchen product pipeline addition.";

            if (!name || isNaN(price) || isNaN(stock)) return alert("Please fill out Name, Price, and Stock parameters.");

            try {
                const response = await fetch(`${API_BASE}/admin/menu`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, price, desc, category, stock })
                });

                if (!response.ok) throw new Error();
                const data = await response.json();
                
                // CRITICAL FIX: Match key structure returned from main.py model tracking schema
                const newId = data.item.item_id || data.item.id;
                menuData[newId] = { name: data.item.name, price: data.item.price, stock: stock, category: category, is_visible: true };
                
                document.getElementById("new-item-name").value = "";
                document.getElementById("new-item-price").value = "";
                document.getElementById("new-item-stock").value = "";
                document.getElementById("new-item-desc").value = "";
                
                renderMasterInventoryPanel();
                alert(`Successfully deployed item entry: ${data.item.name}`);
            } catch (err) {
                alert("Failed to write new parameters into database framework logs.");
            }
        }

        // 5. Query Backend Database for Order State
        async function fetchOrderDetails() {
            const orderId = document.getElementById("scan-input").value;
            if (!orderId) return alert("Please enter or scan a valid Order ID.");

            const display = document.getElementById("order-display");
            display.classList.add("hidden");

            try {
                currentActiveOrderId = parseInt(orderId);
                verifyAndComplete(currentActiveOrderId);
            } catch (err) {
                alert("Communication breakdown with backend server.");
            }
        }

        // 6. Transmit Final State Settlement to PostgreSQL
        async function verifyAndComplete(orderId) {
            const display = document.getElementById("order-display");
            
            try {
                const response = await fetch(`${API_BASE}/admin/verify`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ order_id: orderId })
                });

                if (!response.ok) {
                    let errorMessage = "An error occurred on the server pipeline.";
                    try {
                        const errorData = await response.json();
                        errorMessage = errorData.detail || errorMessage;
                    } catch (e) {
                        errorMessage = `Server Error Status: ${response.status}`;
                    }

                    display.classList.remove("hidden");
                    display.innerHTML = `
                        <div class="bg-red-950/40 border border-red-500/30 rounded-2xl p-6 text-center space-y-2">
                            <div class="text-3xl">⚠️</div>
                            <h3 class="text-lg font-bold text-red-400">Verification Rejected</h3>
                            <p class="text-sm text-slate-300 font-medium px-2">${errorMessage}</p>
                        </div>
                    `;
                    return;
                }

                const data = await response.json();
                display.classList.remove("hidden");

                let itemsHtml = data.order_details.items.map(item => `
                    <div class="flex justify-between items-center border-b border-slate-800/60 pb-2 text-sm">
                        <span class="text-slate-200 font-medium">${item.name}</span>
                        <span class="bg-slate-800 text-amber-400 px-3 py-0.5 rounded font-mono font-bold">x${item.quantity}</span>
                    </div>
                `).join('');

                display.innerHTML = `
                    <div class="bg-emerald-950/40 border border-emerald-500/30 rounded-2xl p-5 space-y-4 shadow-xl">
                        <div class="flex justify-between items-start border-b border-slate-800 pb-3">
                            <div>
                                <span class="bg-emerald-500 text-slate-950 text-[10px] font-extrabold px-2 py-0.5 rounded tracking-wide uppercase">VERIFIED & PAID</span>
                                <h3 class="text-xl font-bold mt-1">Order #${data.order_details.order_id}</h3>
                            </div>
                            <div class="text-right">
                                <p class="text-xs text-slate-400">Total Collected</p>
                                <p class="text-lg font-mono font-bold text-emerald-400">₹${data.order_details.total_amount.toFixed(2)}</p>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Dispense Payload:</p>
                            <div class="space-y-2.5 pt-1">${itemsHtml}</div>
                        </div>
                        <div class="bg-emerald-500/10 border border-emerald-500/20 rounded-xl p-3 text-center text-xs font-medium text-emerald-400">
                            ✓ Database state marked COMPLETED. Hand over food items now.
                        </div>
                    </div>
                `;

                document.getElementById("scan-input").value = "";

            } catch (err) {
                console.error("Network crash details:", err);
                alert(`Network Connection Failed: ${err.message}. Check your console logs!`);
            }
        }

        // 7. Fire Stock Transmissions into Database Pipeline
        async function commitStockUpdate(itemId) {
            const stockInput = document.getElementById(`stock-input-${itemId}`);
            const newStockValue = parseInt(stockInput.value);

            if (isNaN(newStockValue) || newStockValue < 0) {
                return alert("Please enter a valid stock integer count.");
            }

            try {
                const response = await fetch(`${API_BASE}/admin/stock`, {
                    method: "PATCH",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        item_id: itemId,
                        new_stock: newStockValue
                    })
                });

                if (!response.ok) throw new Error();
                menuData[itemId].stock = newStockValue;
                triggerControlSuccessFeedback(stockInput);

            } catch (err) {
                console.error(err);
                alert("Network communication barrier encountered while writing stock metrics.");
            }
        }

        function triggerControlSuccessFeedback(inputTargetElement) {
            inputTargetElement.classList.remove("border-slate-700");
            inputTargetElement.classList.add("border-emerald-500", "text-emerald-400");
            
            setTimeout(() => {
                inputTargetElement.classList.remove("border-emerald-500", "text-emerald-400");
                inputTargetElement.classList.add("border-slate-700");
            }, 1200);
        }
    </script>
</body>
</html>
